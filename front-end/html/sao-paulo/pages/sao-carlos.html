<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>cadastre-se</h1>
    <form action="">
      <label for="name">Nome:</label>
      <br />
      <input
        type="text"
        placeholder="Digite o seu nome"
        value=""
        name="name"
        id="name"
      />
      <br />
      <label for="lastname">Lastname:</label>
      <br />
      <input
        type="text"
        placeholder="Digite o seu último nome"
        value=""
        name="lastname"
        id="lastname"
      />
      <br />
      <input type="submit" />
    </form>

    <hr />
    <h2>Escolha de linguagm favorita</h2>
    <form action="">
      <input type="radio" id="html" value="HTML" name="language" />
      <label for="html">HTML</label>
      <input type="radio" id="css" value="CSS" name="language" />
      <label for="css">CSS</label>
      <input type="radio" id="javascript" value="JavaScript" name="language" />
      <label for="javascript">JavaScript</label>
    </form>

    <h2>Acerte o botão correto</h2>
    <form action="">
      <input type="radio" id="html" value="HTML" name="language" />
      <label for="css">HTML</label>
      <input type="radio" id="css" value="CSS" name="language" />
      <label for="javascript">CSS</label>
      <input type="radio" id="javascript" value="JavaScript" name="language" />
      <label for="html">JavaScript</label>
    </form>
  </body>
</html>
